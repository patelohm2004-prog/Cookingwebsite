<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Feedback</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .feedback-container {
            padding: 40px;
        }

        form {
            width: 50%;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

<header>
  <div class="logo">
            
                <a href="Index.html"><h2>🍳 Cooking Made Easy</h2></a>
            
        </div>

        <div class="logo">
        </div>

        <nav>
            <a href="recipe.html">RECIPE</a>
            <a href="Quickmeal.html">QUICK MEAL</a>
            <a href="Budgetfriendly.html">BUDGET FRIENDLY</a>
            <a href="Feedback.html">FEEDBACK</a>
        </nav>
</header>
<section class="feedback-container">

    <div class="feedback-left">
    <h1>WE'D LOVE YOUR FEEDBACK</h1>

    <form>

        <label>Full Name:</label>
        <input type="text" required>

        <label>Email Address:</label>
        <input type="email" required>

        <label>Which recipe did you try?</label>
        <input type="text">

        <label>Rate your experience:</label>
        <select>
            <option>Excellent</option>
            <option>Good</option>
            <option>Okay</option>
            <option>Poor</option>
        </select>

        <label>Comments:</label>
        <textarea rows="5"></textarea>

        <button style="background-color: #c7d6a1; padding:10px; border:none;">
            Submit
        </button>

    </form>
    </div>
    
    <div class="feedback-right">
        <img src="images/8270986_5480.jpg" alt="Feedback">
    </div>
</section>

<footer>
    <p>Cooking Made Easy | Home | Recipes | Videos | About | Feedback</p>
    <p>Contact: cookingmadeeasy@email.com</p>
    <p>© 2026 Cooking Made Easy</p>
</footer>

</body>
</html>
